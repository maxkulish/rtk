[filters.tofu-output]
description = "Compact OpenTofu output"
match_command = "^tofu\\s+output(\\s|$)"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
]
max_lines = 40

[[tests.tofu-output]]
name = "key-value output preserved"
input = """
vpc_id = "vpc-abc123"

subnet_ids = [
  "subnet-111",
  "subnet-222",
]

instance_ip = "10.0.1.5"
"""
expected = "vpc_id = \"vpc-abc123\"\nsubnet_ids = [\n  \"subnet-111\",\n  \"subnet-222\",\n]\ninstance_ip = \"10.0.1.5\""

[[tests.tofu-output]]
name = "single value passthrough"
input = "10.0.1.5"
expected = "10.0.1.5"
