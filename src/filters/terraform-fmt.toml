[filters.terraform-fmt]
description = "Compact Terraform fmt output"
match_command = "^terraform\\s+fmt(\\s|$)"
strip_ansi = true
on_empty = "terraform fmt: ok (no changes)"
max_lines = 30

[[tests.terraform-fmt]]
name = "empty output returns on_empty message"
input = ""
expected = "terraform fmt: ok (no changes)"

[[tests.terraform-fmt]]
name = "changed files pass through"
input = "main.tf\nvariables.tf"
expected = "main.tf\nvariables.tf"
